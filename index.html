<!doctype html>
<html lang="pt-BR">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>CBS Analytics Enterprise V4</title>
  <link rel="stylesheet" href="estilos.css">
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>
<main class="layout">
  <aside class="sidebar">
    <div class="brand-lockup">
      <div class="waves-mini"><b>Waves</b><span>plus</span></div>
      <div class="cbs-mini">CBS</div>
    </div>
    <h2>CBS Analytics</h2>
    <button class="nav active" data-view="executivo">🏠 Diretoria</button>
    <button class="nav" data-view="meta">📢 Meta Ads</button>
    <button class="nav" data-view="sala">🏗 Sala de Guerra</button>
    <button class="nav" data-view="pos">🚀 Pós-feira</button>
    <button class="nav" data-view="crm">💼 CRM</button>
    <button class="nav" data-view="apps">🤖 Apps</button>
    <button class="nav" data-view="dados">⚙ Dados</button>
    <div class="sidebar-foot">Waves Plus + CBS<br><b>Dados + Disciplina + Ação</b></div>
  </aside>

  <section class="content">
    <header class="top">
      <div>
        <small id="eyebrow">Visão executiva</small>
        <h1 id="title">Dashboard da Diretoria</h1>
        <p id="subtitle">Operação pós-feira Expoconstruir 2026</p>
      </div>
      <div class="top-actions">
        <select id="monthSelect"></select>
        <button id="printBtn">📄 PDF</button>
        <button id="themeBtn">🌙 Tema</button>
      </div>
    </header>

    <section id="view-executivo" class="view active"></section>
    <section id="view-meta" class="view"></section>
    <section id="view-sala" class="view"></section>
    <section id="view-pos" class="view"></section>
    <section id="view-crm" class="view"></section>
    <section id="view-apps" class="view"></section>
    <section id="view-dados" class="view"></section>
  </section>
</main>
<script src="app.js"></script>
</body>
</html>
